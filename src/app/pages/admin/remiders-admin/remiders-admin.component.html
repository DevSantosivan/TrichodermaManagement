<div class="max-w-6xl mx-auto p-6 bg-[#0d0d0d] min-h-screen text-gray-200">
  <!-- HEADER -->
  <div
    class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4"
  >
    <div>
      <h1 class="text-2xl font-bold text-gray-200">Watering Guides</h1>
      <p class="text-gray-400 mt-1">Manage watering instructions per crop</p>
    </div>
    <button
      (click)="openCreate()"
      class="p-2 bg-[#0f6b49] border border-[#1ea26f] text-white rounded-lg hover:bg-[#0c5c3f]"
    >
      + Add Reminder
    </button>
  </div>

  <!-- SEARCH -->
  <input
    type="search"
    [(ngModel)]="searchText"
    placeholder="Search reminders..."
    class="w-full sm:w-64 border border-[#1f1f1f] rounded px-3 py-2 bg-[#111111] text-gray-200 mb-4"
  />

  <!-- LOADING -->
  <div *ngIf="loading" class="flex justify-center items-center h-64">
    <svg class="animate-spin h-10 w-10 text-[#3ae68d]" viewBox="0 0 24 24">
      <circle
        class="opacity-25"
        cx="12"
        cy="12"
        r="10"
        stroke="currentColor"
        stroke-width="4"
      ></circle>
      <path
        class="opacity-75"
        fill="currentColor"
        d="M4 12a8 8 0 018-8v8H4z"
      ></path>
    </svg>
  </div>

  <!-- NO DATA -->
  <div
    *ngIf="!loading && filteredReminders().length === 0"
    class="text-center py-16 text-gray-500"
  >
    🌱 No crop reminders found.
  </div>

  <!-- TABLE -->
  <table
    *ngIf="!loading && filteredReminders().length > 0"
    class="w-full border border-[#1f1f1f] rounded-xl text-sm mt-4"
  >
    <thead class="bg-[#111111] border-b border-[#1f1f1f]">
      <tr>
        <th class="px-4 py-3 text-gray-300">Crop</th>
        <th class="px-4 py-3 text-gray-300">Instructions</th>
        <th class="px-4 py-3 text-gray-300">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr
        *ngFor="let r of filteredReminders()"
        class="border-b border-[#1f1f1f] hover:bg-[#151515]"
      >
        <td class="px-4 py-3 flex items-center space-x-2">
          <img
            [src]="r.image_url"
            class="w-16 h-16 rounded object-cover border border-[#1f1f1f]"
          />
          <span class="text-[#3ae68d] font-medium">{{ r.crop_name_en }}</span>
        </td>
        <td class="px-4 py-3">
          <div *ngFor="let step of r.steps" class="mb-2">
            <p class="text-gray-300">
              <span class="text-[#3ae68d] font-semibold">EN:</span>
              {{ step.instructionEn }}
            </p>
            <p class="text-gray-400">
              <span class="text-[#3ae68d] font-semibold">TL:</span>
              {{ step.instructionTl }}
            </p>
          </div>
        </td>
        <td class="px-4 py-3 text-center">
          <button
            (click)="openEdit(r)"
            class="px-3 py-1 w-full bg-[#3ae68d]/20 text-[#3ae68d] rounded hover:bg-[#3ae68d]/30"
          >
            Edit
          </button>
          <button
            (click)="delete(r)"
            class="mt-2 px-3 py-1 w-full bg-red-800/20 text-red-400 rounded hover:bg-red-900/30"
          >
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- MODAL -->
  <div
    *ngIf="showModal"
    class="fixed inset-0 flex justify-end bg-black/40 backdrop-blur-sm z-50"
  >
    <div
      class="w-full sm:w-[520px] h-full bg-[#111111] border-l border-[#1f1f1f] flex flex-col"
    >
      <div class="p-6 pb-4 border-b border-[#1f1f1f] flex justify-between">
        <h2 class="text-xl text-white">
          {{ isEditing ? "Edit Reminder" : "Add Reminder" }}
        </h2>
        <button
          (click)="closeModal()"
          class="text-gray-400 hover:text-gray-200 text-3xl"
        >
          &times;
        </button>
      </div>

      <div class="flex-1 overflow-y-auto p-6 space-y-4" [formGroup]="form">
        <select
          formControlName="crop_id"
          (change)="onCropSelected($event)"
          class="w-full border border-[#1f1f1f] rounded bg-[#0f0f0f] px-3 py-2 text-gray-200"
        >
          <option value="">-- Select Crop --</option>
          <option *ngFor="let c of crops" [value]="c.id">
            {{ c.title_en }}
          </option>
        </select>

        <img
          *ngIf="imagePreview"
          [src]="imagePreview"
          class="w-full h-40 object-cover rounded"
        />
        <!-- <input
          type="file"
          accept="image/*"
          (change)="onImageSelected($event)"
          class="text-gray-300"
        /> -->

        <textarea
          formControlName="description_en"
          placeholder="Description EN"
          class="w-full border px-3 py-2 rounded bg-[#0f0f0f] text-gray-200"
        ></textarea>
        <textarea
          formControlName="description_tl"
          placeholder="Description TL"
          class="w-full border px-3 py-2 rounded bg-[#0f0f0f] text-gray-200"
        ></textarea>

        <h4 class="text-gray-300">Steps</h4>
        <div
          *ngFor="let step of steps.controls; let i = index"
          [formGroup]="step"
          class="space-y-2 border-b border-[#1f1f1f] pb-2"
        >
          <input
            formControlName="instructionEn"
            placeholder="Instruction EN"
            class="w-full border px-3 py-2 rounded bg-[#0f0f0f] text-gray-200"
          />
          <input
            formControlName="instructionTl"
            placeholder="Instruction TL"
            class="w-full border px-3 py-2 rounded bg-[#0f0f0f] text-gray-200"
          />
          <span>Day for alert</span>
          <input
            formControlName="day"
            type="number"
            placeholder="Day"
            class="w-full border mt-2 px-3 py-2 rounded bg-[#0f0f0f] text-gray-200"
          />
          <button
            *ngIf="steps.length > 1"
            (click)="removeStep(i)"
            class="px-2 py-1 bg-red-800/20 text-red-400 rounded"
          >
            Remove
          </button>
        </div>
        <button
          (click)="addStep()"
          class="px-3 py-1 bg-[#0f6b49] border border-[#1ea26f] text-white rounded"
        >
          + Add Step
        </button>
      </div>

      <div class="p-4 border-t border-[#1f1f1f] flex justify-end space-x-3">
        <button (click)="closeModal()" class="px-4 py-2 border rounded">
          Cancel
        </button>
        <button
          (click)="save()"
          class="px-4 py-2 bg-[#0f6b49] text-white rounded"
        >
          Save
        </button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div
    *ngIf="toast.show"
    class="fixed top-5 right-5 z-[9999] min-w-[300px] max-w-[360px] rounded-xl px-5 py-4 border border-[#1e1e1e] bg-[#111111] text-gray-300 shadow-[0_0_15px_rgba(0,0,0,0.4)] flex items-center justify-between transition-all duration-300"
    [style.opacity]="toast.show ? '1' : '0'"
    [style.transform]="toast.show ? 'translateY(0)' : 'translateY(-10px)'"
  >
    <div class="flex items-center space-x-3">
      <svg
        *ngIf="toast.type === 'loading'"
        class="animate-spin h-4 w-4 text-gray-400"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
      >
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8v8H4z"
        ></path>
      </svg>
      <p class="text-sm font-medium">{{ toast.message }}</p>
    </div>
    <button
      (click)="hideToast()"
      class="text-gray-500 hover:text-gray-300 text-lg leading-none"
    >
      ✕
    </button>
  </div>
</div>
